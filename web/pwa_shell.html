<!DOCTYPE html>
<html lang="it">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover">
		<meta name="theme-color" content="#173f46">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	background: #173f46;
	overflow: hidden;
	overscroll-behavior: none;
}

body {
	color: white;
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
	padding-top: env(safe-area-inset-top);
	padding-right: env(safe-area-inset-right);
	padding-bottom: env(safe-area-inset-bottom);
	padding-left: env(safe-area-inset-left);
	box-sizing: border-box;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.75rem;
	border: 1px solid #9b3943;
	color: #fff8e8;
	font-family: system-ui, sans-serif;
	line-height: 1.35;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#pwa-update {
	position: fixed;
	top: calc(env(safe-area-inset-top) + 14px);
	left: 50%;
	transform: translate(-50%, -130%);
	z-index: 1000;
	display: flex;
	align-items: center;
	gap: 12px;
	max-width: min(92vw, 680px);
	padding: 10px 12px 10px 16px;
	border: 2px solid #f1b94b;
	border-radius: 16px;
	background: rgba(16, 44, 49, 0.97);
	box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
	font: 600 15px/1.2 system-ui, sans-serif;
	transition: transform 180ms ease-out;
	pointer-events: auto;
}

#pwa-update.visible {
	transform: translate(-50%, 0);
}

#pwa-update-message {
	flex: 1;
}

#pwa-update-button {
	min-height: 40px;
	padding: 8px 15px;
	border: 0;
	border-radius: 11px;
	background: #d98224;
	color: #fff;
	font: 700 14px system-ui, sans-serif;
	cursor: pointer;
}

#pwa-update-button:focus-visible {
	outline: 3px solid #fff8e8;
	outline-offset: 3px;
}

@media (prefers-reduced-motion: reduce) {
	#pwa-update {
		transition: none;
	}
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">Il browser non supporta il canvas.</canvas>
		<noscript>JavaScript deve essere attivo per avviare il gioco.</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<div id="pwa-update" role="status" aria-live="polite" aria-atomic="true" aria-hidden="true" inert>
			<span id="pwa-update-message">È disponibile una nuova versione.</span>
			<button id="pwa-update-button" type="button" tabindex="-1">Aggiorna e riavvia</button>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const mobilePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
const appleMobile = /iPad|iPhone|iPod/.test(navigator.userAgent)
	|| (/Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
window.degustibusMobileProfile = appleMobile || (/Android/.test(navigator.userAgent) && mobilePointer);
window.degustibusSafeMode = sessionStorage.getItem('degustibus-webgl-safe') === '1'
	|| new URLSearchParams(window.location.search).get('safe') === '1';
const engine = new Engine(GODOT_CONFIG);
const pwaInstallPromise = (
	GODOT_CONFIG.serviceWorker
	&& !GODOT_CONFIG.ensureCrossOriginIsolationHeaders
	&& 'serviceWorker' in navigator
) ? engine.installServiceWorker().catch((error) => {
	console.error('PWA service worker install failed:', error);
	return null;
}) : Promise.resolve(null);

(function setupWebGlRecovery() {
	const canvas = document.getElementById('canvas');
	canvas.addEventListener('webglcontextlost', (event) => {
		event.preventDefault();
		if (!window.degustibusSafeMode) {
			sessionStorage.setItem('degustibus-webgl-safe', '1');
			window.setTimeout(() => window.location.reload(), 180);
			return;
		}
		const notice = document.getElementById('status-notice');
		const overlay = document.getElementById('status');
		if (notice && overlay) {
			notice.textContent = 'Memoria grafica esaurita. Chiudi le altre schede del browser e riapri il gioco.';
			notice.style.display = 'block';
			overlay.style.visibility = 'visible';
		}
	}, false);
}());

(function setupPwaUpdates() {
	const banner = document.getElementById('pwa-update');
	const message = document.getElementById('pwa-update-message');
	const button = document.getElementById('pwa-update-button');
	let registration = null;
	let reloading = false;
	let hideTimer = 0;

	function hide() {
		if (hideTimer) {
			window.clearTimeout(hideTimer);
			hideTimer = 0;
		}
		if (banner.contains(document.activeElement)) {
			document.getElementById('canvas')?.focus({ preventScroll: true });
		}
		banner.classList.remove('visible');
		banner.setAttribute('aria-hidden', 'true');
		banner.setAttribute('inert', '');
		button.tabIndex = -1;
	}

	function show(text, actionable, focusAction = false) {
		if (hideTimer) {
			window.clearTimeout(hideTimer);
			hideTimer = 0;
		}
		button.style.display = actionable ? 'block' : 'none';
		button.tabIndex = actionable ? 0 : -1;
		button.disabled = false;
		banner.removeAttribute('aria-busy');
		banner.removeAttribute('inert');
		banner.setAttribute('aria-hidden', 'false');
		banner.classList.add('visible');
		message.textContent = text;
		if (actionable && focusAction) {
			window.setTimeout(() => button.focus({ preventScroll: true }), 0);
		}
		if (!actionable) {
			hideTimer = window.setTimeout(hide, 2600);
		}
	}

	function watchInstalling(worker) {
		if (!worker) return;
		worker.addEventListener('statechange', () => {
			if (worker.state === 'installed' && navigator.serviceWorker.controller) {
				show('Nuova versione pronta.', true, false);
			}
		});
	}

	async function getRegistration() {
		if (!('serviceWorker' in navigator)) return null;
		await pwaInstallPromise;
		registration = registration || await navigator.serviceWorker.getRegistration();
		return registration;
	}

	async function performUpdateCheck(manual) {
		try {
			const current = await getRegistration();
			if (!current) {
				if (manual) show('La PWA sarà aggiornabile dopo la prima installazione.', false);
				return 'Prima installazione PWA in corso';
			}
			if (manual) show('Controllo aggiornamenti...', false);
			await current.update();
			if (current.waiting) {
				show('Nuova versione pronta.', true, manual);
				return 'Aggiornamento pronto';
			}
			return 'Controllo aggiornamenti avviato';
		} catch (error) {
			console.error('PWA update check failed:', error);
			if (manual) show('Impossibile controllare gli aggiornamenti.', false);
			return 'Controllo aggiornamenti non riuscito';
		}
	}

	function checkForUpdates(manual) {
		void performUpdateCheck(manual);
		return 'Controllo aggiornamenti avviato';
	}

	button.addEventListener('click', async () => {
		button.disabled = true;
		banner.setAttribute('aria-busy', 'true');
		message.textContent = 'Aggiornamento in corso...';
		const current = await getRegistration();
		if (current && current.waiting) {
			current.waiting.postMessage('update');
		} else {
			window.location.reload();
		}
	});
	banner.addEventListener('keydown', (event) => {
		if (event.key === 'Escape') {
			event.preventDefault();
			hide();
		}
	});

	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.addEventListener('controllerchange', () => {
			if (!reloading) {
				reloading = true;
				window.location.reload();
			}
		});
		window.addEventListener('load', () => {
			window.setTimeout(async () => {
				const current = await getRegistration();
				if (current) {
					current.addEventListener('updatefound', () => watchInstalling(current.installing));
					watchInstalling(current.installing);
					checkForUpdates(false);
				}
			}, 1200);
		});
		document.addEventListener('visibilitychange', () => {
			if (document.visibilityState === 'visible') checkForUpdates(false);
		});
		window.setInterval(() => checkForUpdates(false), 60000);
	}

	window.degustibusPWA = { checkForUpdates };
}());

(function startGame() {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		statusNotice.replaceChildren();
		text.split('\n').forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(error) {
		console.error(error);
		setStatusNotice(error instanceof Error ? error.message : String(error || 'Errore sconosciuto.'));
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length !== 0) {
		if (GODOT_CONFIG.serviceWorker && GODOT_CONFIG.ensureCrossOriginIsolationHeaders && 'serviceWorker' in navigator) {
			Promise.race([
				navigator.serviceWorker.getRegistration().then((registration) => {
					if (registration != null) throw new Error('Service worker già presente.');
					return engine.installServiceWorker();
				}),
				new Promise((resolve) => window.setTimeout(resolve, 2000)),
			]).then(() => window.location.reload()).catch(console.error);
		} else {
			displayFailureNotice('Funzioni Web richieste non disponibili:\n' + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			onProgress(current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => setStatusMode('hidden'), displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
