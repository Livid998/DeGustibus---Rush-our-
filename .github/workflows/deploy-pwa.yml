name: Verifica e pubblica PWA

on:
  push:
    branches: [main]
    paths:
      - assets/**
      - data/**
      - scenes/**
      - scripts/**
      - tests/**
      - tools/release/**
      - web/**
      - project.godot
      - export_presets.cfg
      - BUILD_PWA.ps1
      - PWA.md
      - .github/workflows/deploy-pwa.yml
  workflow_dispatch:
    inputs:
      release:
        description: Identificatore release (es. closed-beta-0.3.0)
        required: true
        default: closed-beta-candidate
        type: string
      publish:
        description: Pubblica su Pages dopo tutti i gate automatici
        required: true
        default: false
        type: boolean
      channel:
        description: Canale di pubblicazione (test automatico o beta con gate iPad)
        required: true
        default: test
        type: choice
        options:
          - test
          - beta
      ipad_evidence:
        description: Link/ID evidence del test fisico iPad di 60 minuti
        required: false
        type: string
      rollback_run_id:
        description: Run ID precedente da ripubblicare senza ricompilare
        required: false
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pwa-release-${{ github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_DIR: 4.7.stable
  GODOT_LINUX: .godot-bin/Godot_v4.7-stable_linux.x86_64
  RELEASE_ARTIFACT: pwa-release-ready

jobs:
  verify:
    name: 1 · Test M0–M3 e soak
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Cache di Godot
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: .godot-bin
          key: godot-linux-${{ env.GODOT_VERSION }}

      - name: Installa Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .godot-bin
          curl --fail --location --retry 3 --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d .godot-bin

      - name: Importa gli asset
        shell: bash
        run: |
          chmod +x "$GODOT_LINUX"
          "$GODOT_LINUX" --headless --path . --import

      - name: Smoke degli strumenti release
        run: python3 tools/release/release_tools_smoke.py

      - name: Matrice autorevole core e milestone
        shell: bash
        run: |
          python3 tools/release/run_godot_matrix.py \
            --godot "$GODOT_LINUX" --project . \
            --groups core,m0,m1,m2,m3,release \
            --isolate-test-results \
            --logs "$RUNNER_TEMP/release-evidence/godot"

      - name: Soak breve e 10 fresh-run fino al giorno 3
        shell: bash
        run: |
          python3 tools/release/run_godot_matrix.py \
            --godot "$GODOT_LINUX" --project . --groups soak \
            --isolate-test-results \
            --timeout 900 --logs "$RUNNER_TEMP/release-evidence/soak"

      - name: Conserva evidence di verifica
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-evidence
          if-no-files-found: error
          retention-days: 90

  export:
    name: 2 · Export clean e budget
    needs: verify
    if: github.event_name != 'workflow_dispatch' || inputs.rollback_run_id == ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Scarica esattamente il commit verificato
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verifica repository sorgente pulito
        shell: bash
        run: |
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain --untracked-files=normal)"

      - name: Cache di Godot
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: .godot-bin
          key: godot-linux-${{ env.GODOT_VERSION }}

      - name: Installa Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .godot-bin
          curl --fail --location --retry 3 --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d .godot-bin

      - name: Cache template Web no-thread
        id: template-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}
          key: godot-web-nothreads-${{ env.GODOT_VERSION }}

      - name: Installa template Web no-thread
        if: steps.template-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl --fail --location --retry 3 --output /tmp/godot-templates.tpz \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          mkdir -p /tmp/godot-template "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_DIR"
          unzip -q /tmp/godot-templates.tpz \
            templates/version.txt templates/web_nothreads_release.zip \
            -d /tmp/godot-template
          mv /tmp/godot-template/templates/* "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_DIR/"

      - name: Esporta una sola volta
        shell: bash
        env:
          RELEASE_ID: ${{ github.event.inputs.release || format('ci-{0}.{1}', github.run_number, github.run_attempt) }}
        run: |
          chmod +x "$GODOT_LINUX"
          "$GODOT_LINUX" --headless --path . --import
          mkdir -p builds/pwa "$RUNNER_TEMP/release-evidence"
          "$GODOT_LINUX" --headless --path . --export-release PWA builds/pwa/index.html
          GODOT_ACTUAL="$($GODOT_LINUX --version)"
          python3 tools/release/prepare_pwa_artifact.py \
            --project . --build builds/pwa --commit "$GITHUB_SHA" \
            --godot-version "$GODOT_ACTUAL" --release "$RELEASE_ID" \
            --mode release --require-clean
          python3 tools/release/verify_pwa_artifact.py \
            --build builds/pwa --require-publishable \
            --max-total-mib 65 --max-wasm-mib 42 --max-pck-mib 25 \
            --evidence "$RUNNER_TEMP/release-evidence/artifact-verification.json"

      - name: Conserva artifact verificato per release e rollback
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: builds/pwa
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

      - name: Conserva budget e metadati
        uses: actions/upload-artifact@v4
        with:
          name: pwa-export-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-evidence
          if-no-files-found: error
          retention-days: 90

  reuse:
    name: 2R · Riusa artifact di rollback
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.rollback_run_id != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Scarica strumenti di verifica correnti
        uses: actions/checkout@v4

      - name: Recupera artifact immutato dal run richiesto
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: release/pwa
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.rollback_run_id }}

      - name: Riapre i gate hard sul rollback
        run: |
          python3 tools/release/verify_pwa_artifact.py \
            --build release/pwa --require-publishable \
            --max-total-mib 65 --max-wasm-mib 42 --max-pck-mib 25

      - name: Espone lo stesso artifact ai gate successivi
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: release/pwa
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  browser-smoke:
    name: 3 · Smoke Chromium e WebKit
    needs: [verify, export, reuse]
    if: always() && needs.verify.result == 'success' && (needs.export.result == 'success' || needs.reuse.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Scarica strumenti di smoke
        uses: actions/checkout@v4

      - name: Scarica l'esatto artifact verificato
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: release/pwa

      - name: Verifica nuovamente hash logici e budget
        run: |
          python3 tools/release/verify_pwa_artifact.py \
            --build release/pwa --require-publishable \
            --max-total-mib 65 --max-wasm-mib 42 --max-pck-mib 25

      - name: Installa browser riproducibili
        run: |
          python3 -m pip install --disable-pip-version-check playwright==1.59.0
          python3 -m playwright install --with-deps chromium webkit

      - name: Avvia PWA e prova entrambi i motori
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/release-evidence"
          python3 -m http.server 4173 --bind 127.0.0.1 --directory release/pwa \
            >"$RUNNER_TEMP/release-evidence/http-server.log" 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          python3 tools/release/browser_smoke.py \
            --base-url http://127.0.0.1:4173 \
            --evidence "$RUNNER_TEMP/release-evidence/browser-smoke.json"

      - name: Conserva evidence browser
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-browser-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-evidence
          if-no-files-found: error
          retention-days: 90

  deploy:
    name: 4 · Pubblicazione test / gate iPad beta
    needs: browser-smoke
    if: >-
      needs.browser-smoke.result == 'success' &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.publish &&
          (inputs.channel == 'test' || (inputs.channel == 'beta' && inputs.ipad_evidence != ''))
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Registra il canale pubblicato
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.channel }}" = "test" ]; then
            echo "Canale: test PWA (non promosso a closed beta)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Canale: closed beta." >> "$GITHUB_STEP_SUMMARY"
            echo "Evidence test fisico iPad 60 minuti: ${{ inputs.ipad_evidence }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Scarica strumenti di verifica
        uses: actions/checkout@v4

      - name: Scarica lo stesso artifact passato dai browser
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: release/pwa

      - name: Ultimo controllo fail-fast, senza re-export
        run: |
          python3 tools/release/verify_pwa_artifact.py \
            --build release/pwa --require-publishable \
            --max-total-mib 65 --max-wasm-mib 42 --max-pck-mib 25

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepara il medesimo artifact per Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: release/pwa

      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
